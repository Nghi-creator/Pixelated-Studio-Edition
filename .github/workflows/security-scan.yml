name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: root
            path: .
          - label: web
            path: apps/web
          - label: desktop
            path: apps/desktop
          - label: api
            path: services/api
          - label: engine-runtime
            path: engine/runtime
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json
          node-version: 22

      - name: Audit ${{ matrix.label }} production dependencies
        working-directory: ${{ matrix.path }}
        run: npm audit --omit=dev --audit-level=high

      # Electron is declared as a development dependency because it is used by
      # the packager, but the resulting Electron runtime ships to users.
      - name: Audit packaged desktop runtime and build chain
        if: matrix.label == 'desktop'
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=high

      - name: Record full dependency audit for review
        continue-on-error: true
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=high

  secret-pattern-scan:
    name: Secret pattern scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan for committed secret-like tokens
        run: |
          set -euo pipefail
          if git grep -InE '(sk_live_[A-Za-z0-9]{16,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{35}|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,})' -- . ':!**/package-lock.json' ':!**/.env.example'; then
            echo "::error::Potential committed secret detected. Rotate it if real, then remove it from the repository."
            exit 1
          fi

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
