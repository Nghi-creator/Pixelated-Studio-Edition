name: Desktop Cross-Platform Release Validation

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-release-validation.yml"
      - "apps/desktop/**"
      - "apps/web/**"
      - "engine/runtime/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-release-validation.yml"
      - "apps/desktop/**"
      - "apps/web/**"
      - "engine/runtime/**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create or update. Leave blank to validate only.
        required: false
        type: string
        default: v1.0.1
      release_name:
        description: Optional GitHub release title.
        required: false
        type: string
        default: Pixelated Studio v1.0.1
      release_body_path:
        description: Markdown file to use as the GitHub release body.
        required: false
        type: string
        default: docs/releases/v1.0.1.md
      release_draft:
        description: Create the release as a draft when it does not already exist.
        required: false
        type: boolean
        default: true
      release_prerelease:
        description: Mark the release as a prerelease when it does not already exist.
        required: false
        type: boolean
        default: false

concurrency:
  group: desktop-release-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-release:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS DMG
            os: macos-14
            artifact: macos-dmg
          - label: Windows NSIS
            os: windows-latest
            artifact: windows-nsis
          - label: Ubuntu AppImage
            os: ubuntu-latest
            artifact: ubuntu-appimage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/web/package-lock.json
          node-version: 22

      - name: Install desktop and web dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix apps/web

      - name: Run desktop diagnostic and release contracts
        run: npm test --prefix apps/desktop

      - name: Lint web app
        run: npm run lint --prefix apps/web

      - name: Run web regression contracts
        run: npm test --prefix apps/web

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Build native installer and run packaged smoke
        run: npm run dist:ci --prefix apps/desktop

      - name: Upload native desktop release
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: pixelated-desktop-${{ matrix.artifact }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
          retention-days: 14

  publish-github-release:
    name: Publish GitHub release assets
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    needs: native-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@v4

      - name: Download validated desktop artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: .context/desktop-release-assets
          pattern: pixelated-desktop-*-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Publish desktop installers to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BODY_PATH: ${{ inputs.release_body_path }}
          RELEASE_DRAFT: ${{ inputs.release_draft }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_PRERELEASE: ${{ inputs.release_prerelease }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          assets=(
            .context/desktop-release-assets/*.dmg
            .context/desktop-release-assets/*.exe
            .context/desktop-release-assets/*.AppImage
          )
          if [ "${#assets[@]}" -ne 3 ]; then
            printf 'Expected 3 desktop release assets (.dmg, .exe, .AppImage), found %s.\n' "${#assets[@]}" >&2
            find .context/desktop-release-assets -maxdepth 1 -type f -print >&2
            exit 1
          fi

          title="${RELEASE_NAME:-$RELEASE_TAG}"
          notes_args=()
          if [ -n "$RELEASE_BODY_PATH" ]; then
            if [ ! -f "$RELEASE_BODY_PATH" ]; then
              printf 'Release body file not found: %s\n' "$RELEASE_BODY_PATH" >&2
              exit 1
            fi
            notes_args=(--notes-file "$RELEASE_BODY_PATH")
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            if [ "${#notes_args[@]}" -gt 0 ]; then
              gh release edit "$RELEASE_TAG" --title "$title" "${notes_args[@]}"
            fi
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            exit 0
          fi

          args=(release create "$RELEASE_TAG" "${assets[@]}" --target "$GITHUB_SHA" --title "$title")
          if [ "$RELEASE_DRAFT" = "true" ]; then
            args+=(--draft)
          fi
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=("${notes_args[@]}")

          gh "${args[@]}"
