name: Hosted API Deploy Gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      proof_mode:
        description: Run only non-destructive contract checks and skip staging predeploy.
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      proof_mode:
        description: Run only non-destructive contract checks and skip staging predeploy.
        required: false
        type: boolean
        default: false

concurrency:
  group: hosted-api-deploy-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-contract:
    name: API contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: services/api/package-lock.json
          node-version: 22

      - name: Install API dependencies
        run: npm ci --prefix services/api

      - name: Validate catalog candidate imports
        run: npm --prefix services/api run check:catalog-candidate-imports

      - name: Verify API contract
        run: npm run verify:api

  hosted-contract:
    name: Hosted web and smoke contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
            apps/desktop/package-lock.json
          node-version: 22

      - name: Install hosted contract dependencies
        run: |
          npm ci
          npm ci --prefix apps/web
          npm ci --prefix apps/desktop

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify hosted web and smoke contract
        run: npm run verify:hosted-contract

  hosted-predeploy:
    name: Hosted schema and predeploy
    if: github.event_name != 'pull_request' && !inputs.proof_mode
    needs:
      - api-contract
      - hosted-contract
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      STAGING_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
      STAGING_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: services/api/package-lock.json
          node-version: 22

      - name: Require staging deploy secrets
        run: |
          test -n "$STAGING_API_URL" || {
            echo "::error::Missing staging environment secret STAGING_API_URL."
            exit 1
          }
          test -n "$STAGING_SUPABASE_URL" || {
            echo "::error::Missing staging environment secret STAGING_SUPABASE_URL."
            exit 1
          }
          test -n "$STAGING_SUPABASE_ANON_KEY" || {
            echo "::error::Missing staging environment secret STAGING_SUPABASE_ANON_KEY."
            exit 1
          }
          test -n "$STAGING_SMOKE_EMAIL" || {
            echo "::error::Missing staging environment secret STAGING_SMOKE_EMAIL."
            exit 1
          }
          test -n "$STAGING_SMOKE_PASSWORD" || {
            echo "::error::Missing staging environment secret STAGING_SMOKE_PASSWORD."
            exit 1
          }

      - name: Install API dependencies
        run: npm ci --prefix services/api

      - name: Run hosted API predeploy gate
        run: npm run predeploy:hosted

  proof-summary:
    name: Hosted deploy gate proof summary
    if: inputs.proof_mode
    needs:
      - api-contract
      - hosted-contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record hosted deploy gate proof mode
        run: |
          mkdir -p .context/hosted-deploy-gate-proof
          jq --null-input \
            '{
              mode: "proof",
              apiContract: "exercised",
              hostedContract: "exercised",
              stagingPredeploy: "skipped",
              reason: "proof_mode verifies deploy gate wiring without requiring staging predeploy secrets"
            }' > .context/hosted-deploy-gate-proof/proof-report.json
          {
            echo "## Hosted deploy gate proof"
            echo
            echo "- API contract: exercised"
            echo "- Hosted web and smoke contract: exercised"
            echo "- Staging predeploy: skipped by proof_mode"
          } > .context/hosted-deploy-gate-proof/proof-report.md

      - name: Upload hosted deploy gate proof artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: hosted-deploy-gate-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: .context/hosted-deploy-gate-proof/
          retention-days: 14
